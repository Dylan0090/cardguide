<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Segoe UI',sans-serif;background:#000;color:#fff;display:flex;align-items:center;justify-content:center;position:relative}
.grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(0,255,136,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,0.03) 1px,transparent 1px);background-size:60px 60px}
.glow1{position:absolute;top:10%;left:15%;width:300px;height:300px;background:radial-gradient(circle,rgba(0,255,136,0.06),transparent 70%);border-radius:50%}
.glow2{position:absolute;bottom:10%;right:10%;width:400px;height:400px;background:radial-gradient(circle,rgba(0,200,255,0.04),transparent 70%);border-radius:50%}
.wrapper{position:relative;z-index:1;text-align:center;max-width:900px;width:90%}
.top-line{display:inline-block;background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.3);color:#00ff88;font-size:11px;font-weight:700;padding:6px 18px;border-radius:4px;letter-spacing:3px;margin-bottom:32px;text-transform:uppercase}
h1{font-size:56px;font-weight:900;letter-spacing:-2px;margin-bottom:16px}
h1 .g{color:#00ff88;text-shadow:0 0 30px rgba(0,255,136,0.3)}
.sub{color:#6b7280;font-size:16px;margin-bottom:40px;line-height:1.7}
.icons-row{display:flex;justify-content:center;gap:20px;margin-bottom:44px;flex-wrap:wrap}
.icon-box{width:90px;height:90px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;transition:all .3s;cursor:default}
.icon-box:hover{border-color:rgba(0,255,136,0.4);background:rgba(0,255,136,0.03);transform:translateY(-4px)}
.icon-box svg{width:28px;height:28px}
.icon-box .name{font-size:10px;color:#9ca3af;font-weight:600}
.features-row{display:flex;justify-content:center;gap:32px;margin-bottom:44px;flex-wrap:wrap}
.feat{display:flex;align-items:center;gap:8px;color:#d1d5db;font-size:13px;font-weight:500}
.feat::before{content:'';width:8px;height:8px;background:#00ff88;border-radius:50%;box-shadow:0 0 8px rgba(0,255,136,0.5)}
.btn-row{display:flex;justify-content:center;gap:16px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:10px;padding:16px 36px;border-radius:10px;text-decoration:none;font-size:15px;font-weight:700;transition:all .25s;border:1px solid transparent}
.btn:hover{transform:translateY(-2px)}
.btn-tg{background:transparent;border-color:#0088cc;color:#00bfff;box-shadow:0 0 20px rgba(0,136,204,0.15)}
.btn-tg:hover{background:rgba(0,136,204,0.1);box-shadow:0 0 30px rgba(0,136,204,0.25)}
.btn-ws{background:transparent;border-color:#25d366;color:#25d366;box-shadow:0 0 20px rgba(37,211,102,0.15)}
.btn-ws:hover{background:rgba(37,211,102,0.1);box-shadow:0 0 30px rgba(37,211,102,0.25)}
.btn svg{width:20px;height:20px}

@media(max-width:768px){
  h1{font-size:36px}
  .sub{font-size:14px;margin-bottom:28px}
  .icons-row{gap:12px;margin-bottom:30px}
  .icon-box{width:70px;height:70px}
  .icon-box svg{width:22px;height:22px}
  .features-row{gap:16px;margin-bottom:30px}
  .feat{font-size:12px}
}
@media(max-width:500px){
  body{overflow:auto;height:auto;min-height:100vh;padding:30px 12px}
  html{height:auto;overflow:auto}
  h1{font-size:28px;letter-spacing:-1px}
  .top-line{font-size:9px;padding:5px 12px;margin-bottom:20px}
  .sub{font-size:13px;margin-bottom:24px}
  .icons-row{gap:8px;margin-bottom:24px}
  .icon-box{width:58px;height:58px;border-radius:12px}
  .icon-box svg{width:20px;height:20px}
  .icon-box .name{font-size:8px}
  .features-row{flex-direction:column;align-items:center;gap:10px;margin-bottom:28px}
  .btn-row{flex-direction:column;gap:10px;width:100%;padding:0 10px}
  .btn{width:100%;justify-content:center;padding:14px 20px}
}
</style>
</head>
